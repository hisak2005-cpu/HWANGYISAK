<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        /* 기본 스타일 설정 */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh; /* 화면 전체 높이 사용 */
        }

        header {
            display: flex;
            justify-content: flex-end;
            padding: 15px 20px;
            gap: 15px;
            align-items: center;
        }

        header a {
            text-decoration: none;
            color: #000;
            font-size: 13px;
        }

        .login-btn {
            background-color: #1a73e8;
            color: white !important;
            padding: 9px 23px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* 메인 검색 영역 */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: -50px;
        }

        .logo {
            font-size: 90px;
            font-weight: bold;
            margin-bottom: 30px;
            user-select: none;
        }

        .g-blue { color: #4285F4; }
        .g-red { color: #EA4335; }
        .g-yellow { color: #FBBC05; }
        .g-green { color: #34A853; }

        .search-box {
            width: 90%;
            max-width: 580px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            transition: box-shadow 0.2s;
        }

        .search-box:hover {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
        }

        .search-box input {
            border: none;
            outline: none;
            flex-grow: 1;
            height: 34px;
            font-size: 16px;
        }

        .buttons {
            margin-top: 30px;
            display: flex;
            gap: 12px;
        }

        .btn {
            background-color: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            font-size: 14px;
            padding: 0 16px;
            line-height: 36px;
            cursor: pointer;
        }

        .btn:hover {
            border: 1px solid #dadce0;
            color: #202124;
        }

        /* ✨ 추가된 전기 안전 안내 링크 스타일 */
        .safety-notice {
            margin-top: 25px;
            font-size: 14px;
            color: #3c4043;
        }

        .safety-notice a {
            color: #1a0dab;
            text-decoration: none;
            font-weight: bold;
        }

        .safety-notice a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <a href="#">Gmail</a>
        <a href="#">이미지</a>
        <a href="#" class="login-btn">로그인</a>
    </header>

    <main>
        <div class="logo">
            <span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue">g</span><span class="g-green">l</span><span class="g-red">e</span>
        </div>

        <div class="search-box">
            <input type="text" id="search-input" onkeyup="if(window.event.keyCode==13){search()}">
        </div>

        <div class="buttons">
            <button class="btn" onclick="search()">Google 검색</button>
            <button class="btn" onclick="lucky()">I'm Feeling Lucky</button>
        </div>

        <div class="safety-notice">
            <span>💡 안전한 우리 집:</span> 
            <a href="2.html">전기 배선 안전 수칙 확인하기</a>
        </div>
    </main>

    <script>
        function search() {
            const query = document.getElementById('search-input').value;
            if (query.trim() !== "") {
                window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(query);
            } else {
                alert("검색어를 입력해주세요!");
            }
        }

        function lucky() {
            window.location.href = "https://www.google.com/doodles";
        }
    </script>

</body>
</html>
